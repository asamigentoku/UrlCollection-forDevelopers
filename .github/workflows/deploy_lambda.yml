name: Deploy to Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package in Lambda Docker container
        run: |
          docker run --rm \
            --entrypoint pip \
            -v "${{ github.workspace }}/lambda":/var/task \
            public.ecr.aws/lambda/python:3.14 \
            install firebase-admin requests -t /var/task/package --upgrade

      - name: Fix package directory permissions
        run: sudo chmod -R 777 lambda/package/

      - name: Build zip
        run: |
          cp lambda/Url_Gather_lambda.py lambda/package/
          cd lambda/package && zip -r ../../function.zip .

      - name: Verify cffi in zip
        run: unzip -l function.zip | grep cffi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name my-firebase-sheet \
            --zip-file fileb://function.zip